exec spawns.cfg
sv_cheats 1;
bot_kick; 
mp_limitteams 0;
mp_autoteambalance 0;
mp_maxmoney 60000;
mp_startmoney 60000;
mp_buytime 9999;
mp_buy_anywhere 1;
mp_freezetime 0;
mp_roundtime 60;
mp_roundtime_defuse 60;
mp_respawn_on_death_ct 1;
mp_respawn_on_death_t 1;
sv_infinite_ammo 1;
sv_showimpacts 1;
sv_showimpacts_time 10;
ammo_grenade_limit_total 5;
mp_warmup_end;
mp_restartgame 1;
sv_grenade_trajectory_prac_pipreview true;
sv_regeneration_force_on 1;
mp_friendlyfire 0;
sv_kick_ban_duration 0;
r_drawOtherModels 2;


bind ALT noclip;
bind U "ent_fire smokegrenade_projectile kill;ent_fire molotov_projectile kill;ent_fire flashbang_projectile kill;ent_fire hegrenade_projectile kill;ent_fire decoy_projectile kill;stopsound"
bind I sv_rethrow_last_grenade; // Z 
alias util "give weapon_smokegrenade; give weapon_flashbang; give weapon_incgrenade;give weapon_molotov;give weapon_hegrenade;"
alias .addb "bot_add_ct"
alias .remb "bot_kick"

say: "U - clear Util || I - Rethrow Grenade || O - Load Spawn || P - Load Next Spawn"
say: "Console Command: util -> gives u every util"
say: "Check Console for Output"
echo "[CFG] Practice Configuration"